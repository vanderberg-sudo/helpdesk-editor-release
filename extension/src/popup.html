<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CA-Capture</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f8f7f4;
    --text: #1f1f1d;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --info: #185fa5;
    --info-bg: #e6f1fb;
    --danger: #a32d2d;
    --danger-bg: #fceaea;
  }
  body {
    margin: 0;
    width: 320px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .logo {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--info-bg);
    display: flex; align-items: center; justify-content: center;
    color: var(--info); font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.3px;
  }
  .body {
    padding: 16px;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .btn-primary {
    background: var(--info);
    color: white;
    border-color: var(--info);
  }
  .btn-danger {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
  }
  .btn-secondary {
    background: var(--bg-secondary);
  }
  .status {
    padding: 12px;
    border-radius: 8px;
    background: var(--bg-secondary);
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .recordings {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 0.5px solid var(--border);
  }
  .recordings h3 {
    margin: 0 0 8px;
    font-size: 12px;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .recording-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .recording-item:hover {
    background: var(--bg-secondary);
  }
  .recording-item .meta {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 2px;
  }
  .footer {
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    font-size: 12px;
    color: var(--text-tertiary);
    display: flex;
    justify-content: space-between;
  }
  .footer a {
    color: var(--info);
    text-decoration: none;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">CA</div>
    <div>
      <div style="font-weight: 500;">CA-Capture</div>
      <div style="font-size: 12px; color: var(--text-tertiary);">v1.2.1</div>
    </div>
  </div>

  <div class="body">
    <div id="idle-view">
      <button id="start-btn" class="btn btn-primary">Start capture</button>
      <div style="font-size: 12px; color: var(--text-tertiary); text-align: center;">
        Records the current tab. Click any element to capture a step.
      </div>
      <div class="recordings" id="recordings-list-container">
        <h3>Recent recordings</h3>
        <div id="recordings-list">
          <div style="font-size: 12px; color: var(--text-tertiary); padding: 8px 0;">No recordings yet.</div>
        </div>
      </div>
    </div>

    <div id="recording-view" style="display: none;">
      <div class="status">
        <div style="font-weight: 500; color: var(--danger); margin-bottom: 4px;">● Recording</div>
        <div>Use the panel on the page to manage capture, or stop here.</div>
      </div>
      <button id="stop-btn" class="btn btn-danger">Stop recording</button>
    </div>
  </div>

  <div class="footer">
    <a id="recent-link">Manage Articles</a>
    <a id="settings-link">Settings</a>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
