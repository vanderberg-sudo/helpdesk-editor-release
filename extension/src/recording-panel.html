<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CA-Capture recording panel</title>
<link rel="stylesheet" href="recording-panel.css">
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <div class="brand">
        <div class="brand-icon">S</div>
        <span>CA-Capture</span>
      </div>
      <div class="header-icons">
        <button class="icon-btn" id="close-btn" title="Stop and close">✕</button>
      </div>
    </div>

    <div class="status-bar" id="status-bar">
      <div class="status-info">
        <span class="rec-dot"></span>
        <span class="rec-label">Recording</span>
        <span class="timer" id="timer">00:00</span>
      </div>
      <div class="status-actions">
        <button class="icon-btn" id="pause-btn" title="Pause">⏸</button>
        <button class="stop-btn" id="stop-btn">Stop</button>
      </div>
    </div>

    <div class="title-section">
      <div class="ai-label">✨ Suggested title</div>
      <div class="suggested-title" id="suggested-title">
        Capturing your workflow...
      </div>
    </div>

    <div class="steps-section">
      <div class="steps-header">
        <span>Steps captured</span>
        <span id="step-count">0</span>
      </div>
      <div class="steps-list" id="steps-list">
        <div class="empty-state">Click anything on the page to start capturing steps.</div>
      </div>
    </div>

    <div class="footer">
      <div class="kbd-hint">
        <kbd>⌘⇧S</kbd> stop · <kbd>⌘⇧N</kbd> add note
      </div>
    </div>
  </div>

  <script src="recording-panel.js"></script>
</body>
</html>
