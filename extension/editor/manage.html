<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CA-Capture · Manage Articles</title>
<style>
  :root {
    --bg:            #ffffff;
    --bg-secondary:  #f6f5f2;
    --bg-tertiary:   #eeece5;
    --text:          #18181b;
    --text-secondary:#52525b;
    --text-tertiary: #a1a1aa;
    --border:        rgba(0,0,0,0.10);
    --border-strong: rgba(0,0,0,0.18);
    --info-bg:       #eff6ff;
    --info-text:     #1d4ed8;
    --danger:        #dc2626;
    --danger-bg:     #fef2f2;
    --danger-border: #fca5a5;
    --r-sm: 6px;
    --r-md: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Topbar ── */
  .topbar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 52px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--info-bg); color: var(--info-text);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; flex-shrink: 0;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .topbar-meta { font-size: 12px; color: var(--text-tertiary); }

  /* ── Filter tabs ── */
  .filter-bar {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex; gap: 0;
  }
  .filter-tab {
    padding: 10px 20px;
    font-size: 13px; font-weight: 500;
    color: var(--text-secondary);
    border: none; background: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: -1px;
  }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active {
    color: var(--info-text);
    border-bottom-color: var(--info-text);
  }

  /* ── Main layout ── */
  main { max-width: 1100px; margin: 32px auto; padding: 0 32px 80px; }

  /* ── State screens ── */
  .state-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 24px;
    text-align: center; color: var(--text-secondary); gap: 12px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--info-text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Category group ── */
  .category-group { margin-bottom: 32px; }
  .category-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .category-label {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-secondary);
  }
  .category-count {
    font-size: 12px; color: var(--text-tertiary);
    background: var(--bg-secondary);
    padding: 2px 8px; border-radius: 20px;
  }
  .category-sublabel {
    font-size: 11px; color: var(--text-tertiary);
    font-weight: 400; margin-left: 4px;
  }

  /* ── Article row ── */
  .article-row {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 14px 18px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 16px;
    transition: opacity 0.3s, background 0.15s;
  }
  .article-row:hover { background: var(--bg-secondary); }
  .article-row.deleting { opacity: 0.5; pointer-events: none; }
  .article-row.deleted {
    opacity: 0; height: 0; padding: 0; margin: 0; border: none; overflow: hidden;
    transition: opacity 0.3s, height 0.4s 0.3s, padding 0.4s 0.3s, margin 0.4s 0.3s;
  }
  .article-info { flex: 1; min-width: 0; }
  .article-title {
    font-size: 14px; font-weight: 500; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .article-description {
    font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .article-meta {
    font-size: 11px; color: var(--text-tertiary);
    display: flex; gap: 12px; align-items: center;
  }
  .article-meta a { color: var(--info-text); text-decoration: none; font-size: 11px; }
  .article-meta a:hover { text-decoration: underline; }

  /* ── Draft-specific ── */
  .draft-hint { color: var(--text-tertiary); font-style: italic; }
  .slug-preview {
    font-family: ui-monospace, monospace; font-size: 11px;
    color: var(--text-tertiary); background: var(--bg-secondary);
    padding: 1px 6px; border-radius: 4px;
  }
  .draft-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-action {
    font-size: 12px; padding: 6px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm); background: var(--bg);
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn-edit { color: var(--text); }
  .btn-edit:hover { background: var(--bg-secondary); }
  .btn-publish-draft { color: var(--info-text); border-color: var(--info-text); }
  .btn-publish-draft:hover { background: var(--info-bg); }
  .btn-delete-draft { color: var(--danger); }
  .btn-delete-draft:hover { background: var(--danger-bg); border-color: var(--danger-border); }
  .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── Published delete button ── */
  .article-actions { flex-shrink: 0; }
  .btn-delete {
    font-size: 12px; padding: 6px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm); background: var(--bg);
    color: var(--danger); cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn-delete:hover { background: var(--danger-bg); border-color: var(--danger-border); }
  .btn-delete:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-delete .btn-spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--danger-border); border-top-color: var(--danger);
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .btn-delete.pending .btn-spinner { display: block; }

  /* ── Row error ── */
  .row-error { font-size: 11px; color: var(--danger); margin-top: 4px; display: none; }
  .row-error.visible { display: block; }

  /* ── Error banner ── */
  .error-banner {
    background: var(--danger-bg); border: 1px solid var(--danger-border);
    border-radius: var(--r-md); padding: 16px 20px;
    color: var(--danger); font-size: 13px; margin-bottom: 24px;
  }

  /* ── Empty ── */
  .empty-category { font-size: 13px; color: var(--text-tertiary); padding: 12px 0; }

  /* ── Section divider ── */
  .section-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 32px 0 20px;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .section-divider-label {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-tertiary); white-space: nowrap;
  }

  /* ── Tab visibility ── */
  .tab-drafts, .tab-published { }
  body[data-tab='drafts']    .tab-published { display: none; }
  body[data-tab='published'] .tab-drafts    { display: none; }
  /* 'all' shows everything — no hiding needed */

  /* ── Pending states (deletion / publish in-flight) ── */
  .article-row.pending-state {
    opacity: 0.65;
    background: var(--bg-secondary);
  }
  .pending-badge {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 500;
    padding: 5px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .pending-badge--delete {
    color: var(--danger);
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
  }
  .pending-badge--publish {
    color: var(--info-text);
    background: var(--info-bg);
    border: 1px solid rgba(29, 78, 216, 0.25);
  }
</style>
</head>
<body data-tab="all">
  <div class="topbar">
    <div class="logo">CA</div>
    <h1>Manage Articles</h1>
    <span class="topbar-meta" id="topbar-meta"></span>
    <a id="wp-import-link" style="font-size:12px;color:var(--info-text);text-decoration:none;cursor:pointer;white-space:nowrap;" title="Import from WordPress">⬆ WordPress Import</a>
  </div>
  <div class="filter-bar">
    <button class="filter-tab active" data-tab="all">All</button>
    <button class="filter-tab" data-tab="drafts">Drafts</button>
    <button class="filter-tab" data-tab="published">Published</button>
  </div>
  <main id="main">
    <div class="state-screen">
      <div class="spinner"></div>
      <p>Loading articles…</p>
    </div>
  </main>
  <script type="module" src="manage.js"></script>
</body>
</html>
