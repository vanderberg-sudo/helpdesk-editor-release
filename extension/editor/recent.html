<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CA-Capture · Recent recordings</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f8f7f4;
    --bg-tertiary: #f1efe8;
    --text: #1f1f1d;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --info: #185fa5;
    --info-bg: #e6f1fb;
    --danger: #a32d2d;
    --danger-bg: #fceaea;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    font-size: 14px;
  }
  .topbar {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--info-bg);
    color: var(--info);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 12px;
  }
  .topbar h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 500;
  }
  main {
    max-width: 900px;
    margin: 32px auto;
    padding: 0 24px;
  }
  .empty {
    background: var(--bg);
    border: 0.5px dashed var(--border);
    border-radius: 12px;
    padding: 48px;
    text-align: center;
    color: var(--text-secondary);
  }
  .empty p { margin: 0; }
  .recording-row {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: background 0.1s;
  }
  .recording-row:hover {
    background: var(--bg-secondary);
  }
  .recording-info {
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }
  .recording-title {
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .recording-meta {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    gap: 10px;
  }
  .recording-meta .dot { color: var(--text-tertiary); }
  .recording-actions {
    display: flex;
    gap: 6px;
  }
  .btn {
    font-size: 12px;
    padding: 6px 12px;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    cursor: pointer;
    color: var(--text);
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn-danger {
    color: var(--danger);
    border-color: var(--border);
  }
  .btn-danger:hover {
    background: var(--danger-bg);
    border-color: var(--danger);
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 200;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">CA</div>
    <h1>Recent recordings</h1>
  </div>
  <main>
    <div id="list"></div>
  </main>
  <script type="module" src="recent.js"></script>
</body>
</html>
